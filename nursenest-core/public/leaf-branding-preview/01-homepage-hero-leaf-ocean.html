<!DOCTYPE html>
<html lang="en" data-theme="ocean">
<head>
<meta charset="utf-8"/>
<title>01 Homepage hero leaf</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="leaf-shared.css"/>
<style>
:root {
  --brand: #1ca3d9; --ink: #1a2330; --muted: #5c6b78; --bg: #f4f9fc;
  --card: #ffffff; --border: #e2eaef; --soft: #e8f6fc;
  --leaf-tint: #1ca3d9; --leaf-glow: rgba(28,163,217,0.14);
  --leaf-op-1: 0.09; --leaf-op-2: 0.055; --leaf-op-depth: 0.045;
}
body { font-family: "DM Sans", system-ui, sans-serif; background: var(--bg); color: var(--ink); margin: 0; width: 1280px; }
.wrap { padding: 2rem 2.5rem; }
.label { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--brand); margin-bottom: 0.5rem; }
h1,h2 { font-weight: 800; letter-spacing: -0.02em; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 1.15rem; padding: 1.35rem; position: relative; }
.btn { display: inline-block; padding: 0.7rem 1.25rem; background: var(--brand); color: #fff; font-weight: 700; border-radius: 999px; text-decoration: none; }
</style>
</head>
<body><div class="nn-surface nn-leaf-radial" style="min-height:720px">
  <div class="nn-leaf-layer nn-leaf--tr"><svg viewBox="0 0 50 44" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path class="nn-leaf-fill" d="M6 40 C6 29 14.5 21 25 21 S44 29 44 40 Z"/><path class="nn-leaf-vein" d="M11 40 C11 32.5 17 27 25 27 S39 32.5 39 40 Z"/></svg></div>
  <div class="nn-leaf-layer nn-leaf--bl"><svg viewBox="0 0 50 44" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path class="nn-leaf-fill" d="M6 40 C6 29 14.5 21 25 21 S44 29 44 40 Z"/><path class="nn-leaf-vein" d="M11 40 C11 32.5 17 27 25 27 S39 32.5 39 40 Z"/></svg></div>
  <div class="nn-leaf-layer nn-leaf--depth"><svg viewBox="0 0 50 44" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path class="nn-leaf-fill" d="M6 40 C6 29 14.5 21 25 21 S44 29 44 40 Z"/><path class="nn-leaf-vein" d="M11 40 C11 32.5 17 27 25 27 S39 32.5 39 40 Z"/></svg></div>
  <div class="wrap" style="display:grid;grid-template-columns:1fr 1fr;gap:2.5rem;align-items:center;padding-top:3rem">
    <div>
      <p class="label">Leaf branding · Ocean</p>
      <h1 style="font-size:2.75rem;line-height:1.08;max-width:14ch">Master nursing with <span style="color:var(--brand)">AI-powered</span> coaching</h1>
      <p style="color:var(--muted);max-width:42ch;margin:1rem 0 1.5rem">Corner + depth watermarks — subtle, not decorative clutter.</p>
      <a class="btn" href="#">Start free</a>
    </div>
    <div class="card" style="box-shadow:0 16px 48px -24px rgba(26,35,48,.14)">
      <div class="nn-leaf-card-accent"><svg viewBox="0 0 50 44" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path class="nn-leaf-fill" d="M6 40 C6 29 14.5 21 25 21 S44 29 44 40 Z"/><path class="nn-leaf-vein" d="M11 40 C11 32.5 17 27 25 27 S39 32.5 39 40 Z"/></svg></div>
      <p class="label">Readiness</p>
      <p style="font-size:3rem;font-weight:800;color:var(--brand);margin:0">78%</p>
    </div>
  </div>
</div></body>
</html>
