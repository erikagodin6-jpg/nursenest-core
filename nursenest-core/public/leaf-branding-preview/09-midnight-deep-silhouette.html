<!DOCTYPE html>
<html lang="en" data-theme="midnight">
<head>
<meta charset="utf-8"/>
<title>09 Midnight</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="leaf-shared.css"/>
<style>
:root {
  --brand: #5ec8ef; --ink: #eef4f8; --muted: #8fa3b0; --bg: #0c1016;
  --card: #141a22; --border: #24303c; --soft: #1a2430;
  --leaf-tint: #5ec8ef; --leaf-glow: rgba(94,200,239,0.08);
  --leaf-op-1: 0.07; --leaf-op-2: 0.04; --leaf-op-depth: 0.06;
}
body { font-family: "DM Sans", system-ui, sans-serif; background: var(--bg); color: var(--ink); margin: 0; width: 1280px; }
.wrap { padding: 2rem 2.5rem; }
.label { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--brand); margin-bottom: 0.5rem; }
h1,h2 { font-weight: 800; letter-spacing: -0.02em; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 1.15rem; padding: 1.35rem; position: relative; }
.btn { display: inline-block; padding: 0.7rem 1.25rem; background: var(--brand); color: #0c1016; font-weight: 700; border-radius: 999px; text-decoration: none; }
</style>
</head>
<body><div class="nn-surface" style="min-height:640px;background:var(--bg)">
  <div class="nn-leaf-layer nn-leaf--tr" style="opacity:0.06;filter:blur(4px)"><img src="/logos/blossom-leaf.png" alt="" aria-hidden="true" style="display:block;width:100%;height:auto;object-fit:contain;"></div>
  <div class="nn-leaf-layer nn-leaf--depth" style="opacity:0.08;filter:blur(36px)"><img src="/logos/blossom-leaf.png" alt="" aria-hidden="true" style="display:block;width:100%;height:auto;object-fit:contain;"></div>
  <div class="wrap" style="padding-top:3rem">
    <p class="label">Midnight · deep silhouettes</p>
    <h1 style="font-size:2.5rem">Calm intelligence after dark</h1>
    <p style="color:var(--muted)">Low-contrast illuminated leaf accents — no muddy overlays.</p>
    <div class="card" style="margin-top:2rem;max-width:360px">
      <p style="font-size:2.5rem;font-weight:800;color:var(--brand)">78%</p>
      <p style="color:var(--muted);font-size:.875rem">Readiness · charts stay readable</p>
    </div>
  </div>
</div></body>
</html>
