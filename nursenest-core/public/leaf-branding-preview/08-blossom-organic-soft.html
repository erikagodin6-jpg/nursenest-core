<!DOCTYPE html>
<html lang="en" data-theme="blossom">
<head>
<meta charset="utf-8"/>
<title>08 Blossom</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="leaf-shared.css"/>
<style>
:root {
  --brand: #9b4dca; --ink: #1a2330; --muted: #5c5a68; --bg: #fdf8fc;
  --card: #ffffff; --border: #eadcf0; --soft: #f6e8f8;
  --leaf-tint: #b86fd4; --leaf-glow: rgba(155,77,202,0.16);
  --leaf-op-1: 0.1; --leaf-op-2: 0.06; --leaf-op-depth: 0.05;
}
body { font-family: "DM Sans", system-ui, sans-serif; background: var(--bg); color: var(--ink); margin: 0; width: 1280px; }
.wrap { padding: 2rem 2.5rem; }
.label { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--brand); margin-bottom: 0.5rem; }
h1,h2 { font-weight: 800; letter-spacing: -0.02em; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 1.15rem; padding: 1.35rem; position: relative; }
.btn { display: inline-block; padding: 0.7rem 1.25rem; background: var(--brand); color: #fff; font-weight: 700; border-radius: 999px; text-decoration: none; }
</style>
</head>
<body><div class="nn-surface nn-leaf-radial" style="min-height:640px">
  <div class="nn-leaf-layer nn-leaf--tr" style="opacity:0.11"><svg viewBox="0 0 50 44" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path class="nn-leaf-fill" d="M6 40 C6 29 14.5 21 25 21 S44 29 44 40 Z"/><path class="nn-leaf-vein" d="M11 40 C11 32.5 17 27 25 27 S39 32.5 39 40 Z"/></svg></div>
  <div class="nn-leaf-layer nn-leaf--bl" style="opacity:0.07;filter:blur(10px)"><svg viewBox="0 0 50 44" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path class="nn-leaf-fill" d="M6 40 C6 29 14.5 21 25 21 S44 29 44 40 Z"/><path class="nn-leaf-vein" d="M11 40 C11 32.5 17 27 25 27 S39 32.5 39 40 Z"/></svg></div>
  <div class="wrap" style="padding-top:3rem">
    <p class="label">Blossom · softer organic overlays</p>
    <h1 style="font-size:2.5rem;max-width:16ch">Warm, optimistic <span style="color:var(--brand)">clinical growth</span></h1>
    <p style="color:var(--muted);max-width:40ch">Warmer leaf tint + floral-soft radial — same structure, theme tokens only.</p>
  </div>
</div></body>
</html>
