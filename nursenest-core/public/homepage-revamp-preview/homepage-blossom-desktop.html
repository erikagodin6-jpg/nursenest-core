<!DOCTYPE html>
<html lang="en" data-theme="blossom">
<head>
  <meta charset="utf-8" />
  <title>Homepage Blossom Desktop</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root { --brand:#9b4dca; --ink:#1a2330; --muted:#5c5a68; --bg:#fdf8fc; --card:#fff; --border:#eadcf0; --warm:#f6e8f8; }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--ink)}
    .wrap{max-width:72rem;margin:0 auto;padding:0 1.5rem}
    nav{display:flex;justify-content:space-between;align-items:center;padding:1rem 0;border-bottom:1px solid var(--border);background:rgba(255,255,255,.9)}
    .logo{font-weight:800;color:var(--brand)}
    .hero{padding:4.5rem 0;display:grid;grid-template-columns:1fr 1fr;gap:2.5rem}
    h1{font-size:2.75rem;font-weight:800;line-height:1.1}
    h1 em{font-style:normal;color:var(--brand)}
    p{color:var(--muted);margin:1rem 0 1.5rem}
    .btn{display:inline-block;padding:.75rem 1.25rem;background:var(--brand);color:#fff;font-weight:700;border-radius:999px;text-decoration:none}
    .panel{background:linear-gradient(165deg,var(--warm),var(--card));border:1px solid var(--border);border-radius:1.15rem;padding:1.35rem}
    .score{font-size:3rem;font-weight:800;color:var(--brand)}
  </style>
</head>
<body>
  <div class="wrap">
    <nav><div class="logo">NurseNest</div><a class="btn" href="#">Start free</a></nav>
    <header class="hero">
      <div>
        <p style="font-size:.65rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--brand)">Blossom theme</p>
        <h1>Warm, optimistic <em>clinical readiness</em></h1>
        <p>Same layout and IA as Ocean — supportive, pretty, and academically credible.</p>
        <a class="btn" href="#">Start free</a>
      </div>
      <div class="panel"><p class="score">78%</p><p style="color:var(--muted);font-size:.875rem">Readiness preview</p></div>
    </header>
  </div>
</body>
</html>
