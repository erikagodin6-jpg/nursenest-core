<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/><title>Trust</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;800&display=swap" rel="stylesheet"/>
<style>
body{font-family:"DM Sans",sans-serif;background:#f4f9fc;padding:2.5rem 3rem}
h2{font-size:1.75rem;font-weight:800;color:#1a2330}
.quotes{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-top:1.5rem}
.q{background:#fff;border:1px solid #e2eaef;border-radius:1rem;padding:1.25rem;font-size:.9375rem}
.badges{display:flex;gap:1rem;margin-top:1.5rem;flex-wrap:wrap}
.badge{background:#fff;border:1px solid #e2eaef;border-radius:999px;padding:.5rem 1rem;font-size:.75rem;font-weight:700;color:#5c6b78}
</style></head><body>
<h2>Trusted by nursing learners preparing with confidence</h2>
<div class="badges"><span class="badge">NCSBN-style rationales</span><span class="badge">Adaptive CAT</span><span class="badge">Clinical reasoning</span></div>
<div class="quotes">
<p class="q">"CAT felt like the real exam rhythm."</p>
<p class="q">"Coaching told me exactly what to review next."</p>
<p class="q">"Calm UI — I actually want to study."</p>
</div>
</body></html>
