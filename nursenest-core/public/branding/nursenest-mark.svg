<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 52" width="260" height="52" role="img" aria-label="NurseNest">
  <title>NurseNest</title>
  <!-- NurseNest leaf mark: correct leaf shape (not arch). Tip at upper-right, stem lower-left. -->
  <g transform="translate(2 3) scale(0.84)">
    <!-- Leaf body -->
    <path d="M10 40 C4 32, 2 20, 8 11 C14 2, 30 0, 40 7 C50 14, 50 32, 40 40 C32 46, 16 48, 10 40 Z" fill="#2563eb"/>
    <!-- Stem -->
    <path d="M10 40 L4 47" fill="none" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Midrib vein -->
    <path d="M38 8 L8 41" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round"/>
  </g>
  <text
    x="52"
    y="35"
    font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif"
    font-size="24"
    font-weight="800"
    fill="#1e293b"
  >
    Nurse
  </text>
  <text
    x="132"
    y="35"
    font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif"
    font-size="24"
    font-weight="800"
    fill="#2563eb"
  >
    Nest
  </text>
</svg>
