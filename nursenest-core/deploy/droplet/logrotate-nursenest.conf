# Example logrotate snippets (install under /etc/logrotate.d/nursenest).
# Adjust paths for your PM2 home directory and Caddy log location.

/var/log/caddy/*.log {
  weekly
  rotate 8
  compress
  delaycompress
  missingok
  notifempty
  copytruncate
  su root root
}

