# Next.js app only (Auth.js lives here). Use this spec OR mirror these settings in the DO UI.
# The repo root is the Express+Vite monolith; building "/" runs that heavy build and can hit
# the ~60m App Platform job limit or post-build hangs. Point the component at nursenest-core/.
#
# Apply: App Platform → Settings → App Spec, or: doctl apps update --spec .do/app-nursenest-core-next.yaml
#
name: nursenest-core-next
region: tor

services:
  - name: web
    environment_slug: node-js
    # CPU-only autoscaling (App Platform). No memory/RPS/custom metrics — scale-ups follow CPU only.
    # min=2: never a single instance; max=3: HARD CAP — do not raise without budget review.
    # Scale-down uses platform defaults (gradual; health_check failure_threshold avoids flapping).
    autoscaling:
      min_instance_count: 2
      max_instance_count: 3
      metrics:
        cpu:
          percent: 60
    instance_size_slug: basic-xs
    github:
      repo: erikagodin6-jpg/nursenest-core
      branch: main
      deploy_on_push: true
    source_dir: nursenest-core
    # DB: set `DATABASE_URL` (SECRET) to DigitalOcean Managed Postgres URI. Prisma uses this only.
    # Migrations: GitHub Actions → “Prisma migrate” workflow with secret `DATABASE_URL` (same URI as here).
    # Drop .next/cache after build; prune devDependencies to shrink the slug (runtime uses production deps only).
    # environment_slug=node-js buildpack runs `npm install` automatically before build_command;
    # do NOT include `npm ci` here — that would double-install and waste build minutes.
    build_command: npm run build:deploy && npm prune --omit=dev
    # Standalone server only (next.config output:standalone). Do not use `next start`.
    run_command: node scripts/start-standalone.mjs
    http_port: 8080
    routes:
      - path: /
    # GET /healthz (no DB). Traffic is not routed until checks pass.
    #
    # Next.js 16 standalone: the process prints "Ready in …" when the HTTP socket listens, but
    # `getRequestHandlers()` still runs afterward — every request (including /healthz) awaits that
    # init. On basic-xs that can exceed multiple minutes; probes that start too early see "timeout
    # awaiting headers" until handlers are actually ready. The startup watchdog in
    # `scripts/start-standalone.mjs` now logs:
    # - `startup_watchdog server_listening`
    # - Next's own `Ready in …`
    # - `startup_watchdog handlers_ready`
    # `/healthz` is a minimal Node.js route (no DB/auth) — it keeps the liveness handler cheap once
    # request handlers are ready, but it does not change Next standalone init ordering.
    # Recommendation: move production off `basic-xs`; the observed failure mode is pre-handler startup
    # stall under weak CPU headroom, not route-body work.
    #
    # Rollback: App Platform → Deployments → redeploy a previous successful deployment if a bad build ships.
    # Post-deploy verification: BASE_URL=https://… npm run qa:verify:health (see nursenest-core/docs/deploy-safety.md).
    health_check:
      http_path: /healthz
      port: 8080
      initial_delay_seconds: 240
      period_seconds: 15
      timeout_seconds: 15
      success_threshold: 1
      failure_threshold: 12
    liveness_health_check:
      http_path: /healthz
      port: 8080
      initial_delay_seconds: 240
      period_seconds: 15
      timeout_seconds: 15
      success_threshold: 1
      failure_threshold: 12
    envs:
      - key: NODE_ENV
        value: production
        scope: BUILD_AND_RUN_TIME
      - key: PORT
        value: "8080"
        scope: RUN_TIME
      - key: HOSTNAME
        value: "0.0.0.0"
        scope: RUN_TIME
      - key: AUTH_TRUST_HOST
        value: "true"
        scope: RUN_TIME
      - key: AUTH_SECRET
        scope: RUN_TIME
        type: SECRET
      # Canonical production DB connection (DigitalOcean Managed PostgreSQL). Do not set a second conflicting URL.
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
      # Optional: canonical public URL (your custom domain or *.ondigitalocean.app)
      - key: AUTH_URL
        scope: RUN_TIME
        type: GENERAL
      # Cron HTTP: set CRON_SECRET (SECRET) and call POST /api/cron/blog-batch-schedule, /api/cron/jobs, /api/cron/stripe-reconcile
      # from a Scheduled Job or external scheduler (see nursenest-core/docs/cron-pipelines.md). Optional: STRIPE_RECONCILE_CRON_APPLY=true.
