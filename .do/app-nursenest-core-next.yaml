name: nursenest-core-next
region: tor
domains:
  - domain: nursenest.ca
    type: PRIMARY
    zone: nursenest.ca
  - domain: www.nursenest.ca
    type: ALIAS
    zone: nursenest.ca
ingress:
  rules:
    - component:
        name: web
      match:
        path:
          prefix: /
services:
  - name: web
    image:
      registry_type: GHCR
      registry: ghcr.io
      repository: erikagodin6-jpg/nursenest
      tag: latest
    run_command: node scripts/start-production.mjs
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-s
    health_check:
      http_path: /readyz
      port: 8080
      initial_delay_seconds: 240
      period_seconds: 15
      timeout_seconds: 15
      success_threshold: 1
      failure_threshold: 12
    liveness_health_check:
      http_path: /healthz
      port: 8080
      initial_delay_seconds: 240
      period_seconds: 15
      timeout_seconds: 15
      success_threshold: 1
      failure_threshold: 12
    envs:
      - key: NODE_ENV
        scope: RUN_AND_BUILD_TIME
        value: production
      - key: PORT
        scope: RUN_AND_BUILD_TIME
        value: "8080"
      - key: HOSTNAME
        scope: RUN_AND_BUILD_TIME
        value: 0.0.0.0
      - key: NEXT_PUBLIC_APP_URL
        scope: RUN_AND_BUILD_TIME
        value: https://nursenest.ca
      - key: AUTH_URL
        scope: RUN_TIME
        value: https://nursenest.ca
      - key: NEXTAUTH_URL
        scope: RUN_TIME
        value: https://nursenest.ca
      - key: STRIPE_SECRET_KEY
        scope: RUN_TIME
        type: SECRET
      - key: STRIPE_WEBHOOK_SECRET
        scope: RUN_TIME
        type: SECRET
