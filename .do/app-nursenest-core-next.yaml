# DO NOT CHANGE VIA UI
# This spec is the source of truth for deployment
# Active DigitalOcean App Platform spec for the standalone Next app in `nursenest-core/`.
# Apply with: doctl apps update --spec .do/app-nursenest-core-next.yaml
#
# --- Optional Dockerfile path (deterministic; repo-root context) ---
# Repo-root `/Dockerfile` needs build context to include `nursenest-core/`, `shared/`, `client/`.
# To switch: set `source_dir` to `/` (repo root), add `dockerfile_path: Dockerfile`, remove
# `environment_slug: node-js`, clear `build_command` (compile is inside the image). Keep
# `run_command: npm run start` and `http_port: 8080`. See nursenest-core/docs/deploy-deterministic-docker.md.
#
name: nursenest-core-next
region: tor

services:
  - name: web
    environment_slug: node-js
    # CPU-only autoscaling (App Platform). No memory/RPS/custom metrics — scale-ups follow CPU only.
    # min=2: never a single instance; max=3: HARD CAP — do not raise without budget review.
    # Scale-down uses platform defaults (gradual; health_check failure_threshold avoids flapping).
    autoscaling:
      min_instance_count: 2
      max_instance_count: 3
      metrics:
        cpu:
          percent: 60
    instance_size_slug: basic-xs
    github:
      repo: erikagodin6-jpg/nursenest-core
      branch: main
      deploy_on_push: true
    source_dir: nursenest-core
    # DB: set `DATABASE_URL` (SECRET) to DigitalOcean Managed Postgres URI. Prisma uses this only.
    # Migrations: GitHub Actions → “Prisma migrate” workflow with secret `DATABASE_URL` (same URI as here).
    # `package.json` `cacheDirectories` lists **both** `node_modules` and `.next/cache` (custom list replaces
    # buildpack defaults — see DO Node.js buildpack "Custom Caching"). `heroku-postbuild` runs hints + bootstrap guard +
    # `NN_POSTBUILD_NEXT_BUILD=1 npm run build` so `next build` runs **before** prune/cache (warm `.next/cache`; webpack
    # cache under `.next/cache/webpack`). Marketing production-surface validate runs in GitHub `verify-build.yml` only.
    # With both `heroku-postbuild` and `build`, the Heroku buildpack runs only `heroku-postbuild` (not `build`).
    # `heroku-postbuild` ends with `log-build-cache-hints.mjs --phase=heroku_postbuild_after_compile` (post-`next build`
    # nested counts under `.next/cache/webpack` / `swc`). `heroku-cleanup` → `log-build-cache-hints.mjs --phase=heroku_cleanup`
    # runs **after** cache save + prune (ordering check).
    # `post-build-prune.mjs` preserves `.next/cache` by default (`NN_POST_BUILD_PRUNE_NEXT_CACHE=1` deletes).
    # `build_command`: `npm run build:deploy` → `build:deploy:postbuild` (verify standalone, ensure static, prune).
    # One-shot compile + deploy: `npm run build:deploy:full`. Do NOT add `npm ci` here — install is already done.
    build_command: npm run build:deploy && npm prune --omit=dev --no-fund --no-audit
    # Standalone server only (next.config output:standalone). Do not use `next start`.
    run_command: npm run start
    http_port: 8080
    routes:
      - path: /
    # `/healthz`: bootstrap/liveness only (no DB, no child-handler dependency).
    # `/readyz`: returns 200 only after the child app answers the lightweight internal readiness probe.
    #
    # Next.js 16 standalone can print "Ready in …" before request handlers are actually serving.
    # The bootstrap wrapper now treats logs as informational only; readiness flips only after the
    # internal `/_nn_bootstrap_ready_check__` probe succeeds. The startup watchdog logs:
    # - `startup_watchdog server_listening`
    # - `startup_watchdog handlers_ready`
    # Route platform readiness through `/readyz` so deploy health reflects handler readiness,
    # while liveness stays on `/healthz`.
    #
    # Rollback: App Platform → Deployments → redeploy a previous successful deployment if a bad build ships.
    # Post-deploy verification: BASE_URL=https://… npm run qa:verify:health (see nursenest-core/docs/deploy-safety.md).
    health_check:
      http_path: /readyz
      port: 8080
      initial_delay_seconds: 240
      period_seconds: 15
      timeout_seconds: 15
      success_threshold: 1
      failure_threshold: 12
    liveness_health_check:
      http_path: /healthz
      port: 8080
      initial_delay_seconds: 240
      period_seconds: 15
      timeout_seconds: 15
      success_threshold: 1
      failure_threshold: 12
    envs:
      # Dashboard build env can override YAML. Single-worker forcing is explicit via `NN_FORCE_SINGLE_BUILD_WORKER`
      # (fail-safe) and automatic when `DIGITALOCEAN_APP_ID` is set; opt out only with `NN_ALLOW_MULTI_BUILD_WORKERS=true`.
      - key: NODE_ENV
        value: production
        scope: BUILD_AND_RUN_TIME
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
        scope: BUILD_TIME
      - key: RUN_HEAVY_BUILD_TASKS
        value: "false"
        scope: BUILD_TIME
      - key: SKIP_I18N_PREBUILD
        value: "1"
        scope: BUILD_TIME
      # Do not set `TURBOPACK` / `NEXT_RSPACK` at build time — Next 16 would select Turbopack/Rspack and skip
      # `.next/cache/webpack`. Compile uses `scripts/run-next-prod-build.mjs` which strips accidental host values.
      # Signals App Platform–aware scripts (e.g. marketing guards). `.next/cache` is preserved by default in post-build-prune.
      - key: NN_APP_PLATFORM_BUILD
        value: "true"
        scope: BUILD_TIME
      # Fail-safe: guarantees `next.config.ts` low-memory worker path even if UI strips other flags.
      - key: NN_FORCE_SINGLE_BUILD_WORKER
        value: "true"
        scope: BUILD_TIME
      # Optional: same effect as NN_APP_PLATFORM_BUILD for static prerender concurrency (next.config).
      # - key: BUILD_LOW_MEMORY_STATIC_GENERATION
      #   value: "true"
      #   scope: BUILD_TIME
      # Run `npm prune --omit=dev` as the final orchestrated step (avoids a second shell `npm prune` and records duration).
      - key: NN_TIMED_INCLUDE_NPM_PRUNE
        value: "1"
        scope: BUILD_TIME
      - key: SENTRY_ENABLED
        value: "false"
        scope: BUILD_TIME
      # Global build heap: applies to npm/node during install + heroku-postbuild (not only the Next child). Must match
      # `BUILD_NODE_MAX_OLD_SPACE_SIZE_MB`. Remove any duplicate `NODE_OPTIONS` from the App UI (especially 6144) or
      # merge behavior can keep the higher value for BUILD_AND_RUN_TIME.
      #
      # If the build job is still **terminated** (cgroup OOM) after static prerender concurrency fixes in
      # `next.config.ts`, try **3072** here and on `BUILD_NODE_MAX_OLD_SPACE_SIZE_MB` so the parent Node process
      # leaves more RSS headroom for static workers (they strip `--max-old-space-size` when `isolatedMemory` is on)
      # and for the NFT trace pass.
      - key: NODE_OPTIONS
        value: "--max-old-space-size=4096"
        scope: BUILD_TIME
      # Same cap as `NODE_OPTIONS` (used by `package.json` / `run-next-prod-build.mjs` for explicit heap + docs).
      - key: BUILD_NODE_MAX_OLD_SPACE_SIZE_MB
        value: "4096"
        scope: BUILD_TIME
      - key: BUILD_WEBPACK_PARALLELISM
        value: "1"
        scope: BUILD_TIME
      - key: TMPDIR
        value: /tmp
        scope: BUILD_TIME
      - key: PORT
        value: "8080"
        scope: RUN_TIME
      - key: HOSTNAME
        value: "0.0.0.0"
        scope: RUN_TIME
      - key: AUTH_TRUST_HOST
        value: "true"
        scope: RUN_TIME
      - key: AUTH_SECRET
        scope: RUN_TIME
        type: SECRET
      # Canonical production DB connection (DigitalOcean Managed PostgreSQL). Do not set a second conflicting URL.
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
      # Optional: canonical public URL (your custom domain or *.ondigitalocean.app)
      - key: AUTH_URL
        scope: RUN_TIME
        type: GENERAL
      # Cron HTTP: set CRON_SECRET (SECRET) and call POST /api/cron/blog-batch-schedule, /api/cron/jobs, /api/cron/stripe-reconcile
      # from a Scheduled Job or external scheduler (see nursenest-core/docs/cron-pipelines.md). Optional: STRIPE_RECONCILE_CRON_APPLY=true.
