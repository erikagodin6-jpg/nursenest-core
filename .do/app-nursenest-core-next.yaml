name: nursenest-core-next
region: tor
domains:
  - domain: nursenest.ca
    type: PRIMARY
  - domain: www.nursenest.ca
    type: ALIAS
ingress:
  rules:
    - component:
        name: web
      match:
        path:
          prefix: /
services:
  - dockerfile_path: Dockerfile
    envs:
      - key: NODE_VERSION
        scope: RUN_AND_BUILD_TIME
        value: 22.22.2
      - key: NODE_ENV
        scope: RUN_AND_BUILD_TIME
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        scope: BUILD_TIME
        value: "1"
      - key: RUN_HEAVY_BUILD_TASKS
        scope: BUILD_TIME
        value: "false"
      - key: SKIP_I18N_PREBUILD
        scope: BUILD_TIME
        value: "1"
      - key: NN_APP_PLATFORM_BUILD
        scope: BUILD_TIME
        value: "true"
      - key: NN_LESSON_INDEX_VERIFY_MODE
        scope: BUILD_TIME
        value: manifest
      - key: NN_SKIP_HEAVY_BUILD_REPORTS
        scope: BUILD_TIME
        value: "1"
      - key: NN_LOW_MEMORY_BUILD
        scope: BUILD_TIME
        value: "1"
      - key: NN_BUILD_COMMIT
        scope: RUN_TIME
        value: ${web.COMMIT_HASH}
      - key: NN_BUILD_BRANCH
        scope: RUN_TIME
        value: main
      - key: NN_FORCE_SINGLE_BUILD_WORKER
        scope: BUILD_TIME
        value: "true"
      - key: NN_TIMED_INCLUDE_NPM_PRUNE
        scope: BUILD_TIME
        value: "1"
      - key: SENTRY_ENABLED
        scope: BUILD_TIME
        value: "false"
      - key: NODE_OPTIONS
        scope: BUILD_TIME
        value: --max-old-space-size=4096
      - key: BUILD_NODE_MAX_OLD_SPACE_SIZE_MB
        scope: BUILD_TIME
        value: "4096"
      - key: BUILD_WEBPACK_PARALLELISM
        scope: BUILD_TIME
        value: "1"
      - key: TMPDIR
        scope: BUILD_TIME
        value: /tmp
      - key: PORT
        scope: RUN_TIME
        value: "8080"
      - key: HOSTNAME
        scope: RUN_TIME
        value: 0.0.0.0
      - key: NODE_MAX_OLD_SPACE_SIZE_MB
        scope: RUN_TIME
        value: "1280"
      - key: AUTH_TRUST_HOST
        scope: RUN_TIME
        value: "true"
      - key: AUTH_SECRET
        # App Platform regression workaround: some spec-update deployments are starting the container without
        # injecting RUN_TIME-only secrets, while RUN_AND_BUILD_TIME vars still reach the final Node process.
        # Keep this synchronized with `DATABASE_URL` below and preserve presence-only diagnostics in bootstrap logs.
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: DATABASE_URL
        # Canonical production DB connection (DigitalOcean Managed PostgreSQL). Do not set a second conflicting URL.
        # App Platform regression workaround: the fresh deploy can reach `node scripts/start-standalone.mjs` with
        # `DATABASE_URL_present=false` and `AUTH_SECRET_present=false` even when the live service spec shows both
        # runtime secrets attached. Until that platform/runtime-secret injection path is reliable again, promote the
        # critical boot secret to RUN_AND_BUILD_TIME so the first runtime Node process always receives it.
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: AUTH_URL
        scope: RUN_TIME
        value: https://nursenestcore-njhcf.ondigitalocean.app
      - key: NEXTAUTH_URL
        scope: RUN_TIME
        value: https://nursenestcore-njhcf.ondigitalocean.app
      - key: AI_ADMIN_GENERATION_ENABLED
        scope: RUN_TIME
        value: "false"
      - key: STRIPE_SECRET_KEY
        # Stripe live/test secret key. Must be present at runtime for billing routes.
        # Listed here as a placeholder so doctl apps update never deletes it.
        scope: RUN_TIME
        type: SECRET
      - key: STRIPE_WEBHOOK_SECRET
        # Stripe webhook signing secret (whsec_...). Required to validate incoming Stripe events.
        scope: RUN_TIME
        type: SECRET
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        # Stripe publishable key (pk_live_... or pk_test_...). Baked into client bundle at build time.
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: AI_INTEGRATIONS_OPENAI_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: OPENAI_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: NN_ENV_VALIDATION_MODE
        scope: RUN_TIME
      # Bootstrap probe tuning: wait 5s before first internal probe (avoids 20 wasted
      # ECONNREFUSED cycles while Node loads the Next.js standalone bundle).
      - key: NN_BOOTSTRAP_TEST_DELAY_MS
        scope: RUN_TIME
        value: "5000"
      # Per-probe timeout; 3s gives the child headroom on a loaded basic-xs instance.
      - key: NN_CHILD_HEALTH_TIMEOUT_MS
        scope: RUN_TIME
        value: "3000"
      # ECG module publish flags — must be present so doctl apps update never deletes them.
      - key: ENABLE_ECG_MODULE
        scope: RUN_TIME
        value: "true"
      - key: NEXT_PUBLIC_ENABLE_ECG_MODULE
        scope: RUN_AND_BUILD_TIME
        value: "true"
      # NP subscription Stripe price IDs (canonical). Listed here so doctl apps update cannot delete them.
      - key: STRIPE_PRICE_NURSENEST_NP_1_MONTH_SUBSCRIPTION
        scope: RUN_TIME
        value: price_1TAuJ7Fbgp0Ub5P79Kd4k3Lh
      - key: STRIPE_PRICE_NURSENEST_NP_3_MONTH_SUBSCRIPTION
        scope: RUN_TIME
        value: price_1TAuJiFbgp0Ub5P7XIK12Ehi
      - key: STRIPE_PRICE_NURSENEST_NP_6_MONTH_SUBSCRIPTION
        scope: RUN_TIME
        value: price_1TAuK8Fbgp0Ub5P7skiOC7II
      - key: STRIPE_PRICE_NURSENEST_NP_1_YEAR_SUBSCRIPTION
        scope: RUN_TIME
        value: price_1TAuKUFbgp0Ub5P7iEkkFK6U
      # Advanced ECG add-on Stripe price ID — single price covers all billing durations.
      - key: STRIPE_PRICE_ADVANCED_ECG
        scope: RUN_TIME
        value: price_1TVo8vFbgp0Ub5P7aTySWrbU
    github:
      branch: main
      deploy_on_push: true
      repo: erikagodin6-jpg/nursenest-core
    health_check:
      failure_threshold: 12
      http_path: /readyz
      initial_delay_seconds: 240
      period_seconds: 15
      port: 8080
      success_threshold: 1
      timeout_seconds: 15
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-s
    liveness_health_check:
      failure_threshold: 12
      http_path: /healthz
      initial_delay_seconds: 240
      period_seconds: 15
      port: 8080
      success_threshold: 1
      timeout_seconds: 15
    name: web
    run_command: node scripts/start-standalone.mjs
    source_dir: .
