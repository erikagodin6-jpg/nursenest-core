# Local smoke for the production GHCR image entrypoint (no secrets baked into the image).
# Usage (from repo root, after `docker build`):
#   export DATABASE_URL='postgresql://user:pass@host:5432/db?sslmode=require'
#   export AUTH_SECRET='openssl rand -base64 32'
#   docker compose -f docker-compose.ghcr-local.yml up
#
# Optional: DIRECT_URL, STRIPE_SECRET_KEY, NEXTAUTH_URL=https://localhost:8080
name: nursenest_ghcr_local
services:
  web:
    image: nursenest-core-next:local
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: production
      PORT: "8080"
      HOSTNAME: 0.0.0.0
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in your shell — never commit it}
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET in your shell}
      DIRECT_URL: ${DIRECT_URL:-}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://127.0.0.1:8080}
      AUTH_URL: ${AUTH_URL:-http://127.0.0.1:8080}
      AI_ADMIN_GENERATION_ENABLED: "false"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s
