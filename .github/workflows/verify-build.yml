# Required gate before merge: same checks as DigitalOcean App Platform build (source_dir nursenest-core)
# and droplet `deploy:precheck` — Prisma generate + typecheck + Next production build.
name: Verify Build

on:
  push:
  pull_request:

concurrency:
  group: verify-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      # Align with production compile: heavy multi-locale merge audits run in dedicated i18n jobs.
      SKIP_I18N_PREBUILD: "1"
      # `npm run typecheck` runs before `next build` in `ci:verify`; skip duplicate integrated TS pass
      # to lower peak RAM (see `next.config.mjs` `typescript.ignoreBuildErrors`).
      SKIP_NEXT_BUILD_TYPECHECK: "1"
      # Tighter webpack + static worker profile (see `next.config.mjs` `isLowMemoryBuild`).
      NN_LOW_MEMORY_BUILD: "1"
    timeout-minutes: 45
    defaults:
      run:
        working-directory: nursenest-core
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Guard production reliability workflow (secrets + log safety)
        run: node ../scripts/ci/assert-production-reliability-workflow-guard.mjs

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: nursenest-core/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: CI environment diagnostics
        run: node ../scripts/ci/diagnose-actions-environment.mjs
        env:
          CI_DIAGNOSE_REQUIRED_SCRIPTS: "db:generate db:validate-url-shape validate:marketing-production-surface ci:verify typecheck build"

      # When `DATABASE_URL` is present in the job (optional secret), it must be parseable — no comparison to local.
      - name: Validate DATABASE_URL shape (CI-safe)
        run: npm run db:validate-url-shape
        env:
          CI: "true"

      # Enforced here only (removed from App Platform `heroku-postbuild` to cut deploy build memory).
      - name: Validate marketing production surface
        run: npm run validate:marketing-production-surface

      - name: Deploy precheck (ci:verify — build must pass before deploy)
        run: npm run ci:verify
