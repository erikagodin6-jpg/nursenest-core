# Required gate before merge: same checks as DigitalOcean App Platform build (source_dir nursenest-core)
# and droplet `deploy:precheck` — Prisma generate + typecheck + Next production build.
name: Verify Build

on:
  push:
  pull_request:

concurrency:
  group: verify-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      # Align with production compile: heavy multi-locale merge audits run in dedicated i18n jobs.
      SKIP_I18N_PREBUILD: "1"
    timeout-minutes: 30
    defaults:
      run:
        working-directory: nursenest-core
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: nursenest-core/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Enforced here only (removed from App Platform `heroku-postbuild` to cut deploy build memory).
      - name: Validate marketing production surface
        run: npm run validate:marketing-production-surface

      - name: Deploy precheck (ci:verify — build must pass before deploy)
        run: npm run ci:verify
