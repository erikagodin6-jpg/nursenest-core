# Optional: trigger EAS builds from Git tags. Requires repo secrets:
#   EXPO_TOKEN — https://docs.expo.dev/eas-update/github-actions/
# Remove or keep disabled until EAS project + secrets are provisioned.
name: Mobile EAS Build (optional)

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "EAS profile (development | preview | production)"
        required: true
        default: "preview"
  push:
    tags:
      - "mobile-v*"

jobs:
  eas-build:
    if: false
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/mobile/package-lock.json
      - run: npm ci
      - uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: EAS build
        run: eas build --profile "${{ github.event.inputs.profile || 'preview' }}" --non-interactive --no-wait
