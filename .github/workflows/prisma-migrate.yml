# Run Prisma migrations without a local Node install. Use the SAME Managed Postgres URI as App Platform `DATABASE_URL`.
# 1. Secrets → Actions → DATABASE_URL = DigitalOcean connection string (placeholders only in repo files).
# 2. Trusted sources on the DB must allow GitHub-hosted runners.
# 3. Actions → Prisma migrate → Run workflow
name: Prisma migrate

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: prisma-migrate
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: nursenest-core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: nursenest-core/package-lock.json
      - name: Prisma migrate deploy
        run: npm ci && npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
