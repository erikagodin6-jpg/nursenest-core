# Fails if marketing locale JSON is missing audited nav/footer/breadcrumb/shell keys,
# has empty values, raw English carryover (except allowlist), or placeholder mismatches vs en.json.
# See scripts/validate-nav-i18n.mjs and scripts/lib/nav-i18n-audit.mjs (invoked from nursenest-core via npm script).
name: nav-i18n-validate

on:
  push:
    paths:
      - "nursenest-core/public/i18n/**"
      - "scripts/lib/nav-i18n-audit.mjs"
      - "scripts/lib/ensure-en-nav-keys.mjs"
      - "scripts/lib/i18n-app-root.mjs"
      - "scripts/validate-nav-i18n.mjs"
      - "nursenest-core/scripts/nav-i18n-parity.mjs"
      - "nursenest-core/scripts/nav-i18n-manual-overrides.mjs"
      - "nursenest-core/scripts/sync-required-nav-keys-all-locales.mjs"
      - "nursenest-core/scripts/patch-nav-five-carryover-locales.mjs"
      - "nursenest-core/package.json"
      - ".github/workflows/nav-i18n-validate.yml"
  pull_request:
    paths:
      - "nursenest-core/public/i18n/**"
      - "scripts/lib/nav-i18n-audit.mjs"
      - "scripts/lib/ensure-en-nav-keys.mjs"
      - "scripts/lib/i18n-app-root.mjs"
      - "scripts/validate-nav-i18n.mjs"
      - "nursenest-core/scripts/nav-i18n-parity.mjs"
      - "nursenest-core/scripts/nav-i18n-manual-overrides.mjs"
      - "nursenest-core/scripts/sync-required-nav-keys-all-locales.mjs"
      - "nursenest-core/scripts/patch-nav-five-carryover-locales.mjs"
      - "nursenest-core/package.json"
      - ".github/workflows/nav-i18n-validate.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nursenest-core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: nursenest-core/package-lock.json
      - name: Install dependencies
        run: npm ci
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
          DIRECT_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
      - name: CI environment diagnostics
        run: node ../scripts/ci/diagnose-actions-environment.mjs
        env:
          CI_DIAGNOSE_REQUIRED_SCRIPTS: "i18n:validate-nav"
      - name: Nav / footer / shell i18n guard
        run: npm run i18n:validate-nav
