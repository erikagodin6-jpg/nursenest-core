# Production reliability monitor (read-only checks + bounded Next.js revalidate hints).
# Required repo secrets: NURSENEST_PRODUCTION_BASE_URL, NURSENEST_RELIABILITY_SECRET
# App env: NURSENEST_RELIABILITY_SECRET must match the workflow secret.

name: Production reliability check

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  reliability:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Verify secrets are configured
        env:
          BASE_URL: ${{ secrets.NURSENEST_PRODUCTION_BASE_URL }}
          SECRET: ${{ secrets.NURSENEST_RELIABILITY_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${BASE_URL:-}" ] || [ -z "${SECRET:-}" ]; then
            echo "::error::Missing NURSENEST_PRODUCTION_BASE_URL or NURSENEST_RELIABILITY_SECRET repository secrets."
            exit 1
          fi

      - name: Initial reliability check
        id: initial
        continue-on-error: true
        env:
          BASE_URL: ${{ secrets.NURSENEST_PRODUCTION_BASE_URL }}
          SECRET: ${{ secrets.NURSENEST_RELIABILITY_SECRET }}
        run: |
          set -euo pipefail
          BASE_URL="${BASE_URL%/}"
          echo "Probing ${BASE_URL}/api/internal/reliability/check"
          HTTP_CODE="$(curl -sS -o /tmp/nn-reliability.json -w "%{http_code}" \
            -H "x-nursenest-reliability-secret: ${SECRET}" \
            "${BASE_URL}/api/internal/reliability/check")"
          echo "HTTP ${HTTP_CODE}"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Reliability check HTTP ${HTTP_CODE}"
            cat /tmp/nn-reliability.json || true
            echo "ok=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          jq '{ ok, checkedAt, baseUrl, failureCount: (.failures|length), warningCount: (.warnings|length) }' /tmp/nn-reliability.json
          jq -r '.failures[]?' /tmp/nn-reliability.json | while read -r line; do echo "::warning::${line}"; done || true
          OK="$(jq -r '.ok // false' /tmp/nn-reliability.json)"
          echo "ok=${OK}" >> "$GITHUB_OUTPUT"
          if [ "$OK" != "true" ]; then
            echo "::error::Reliability check reported ok=false on first pass"
            exit 1
          fi
          exit 0

      - name: Bounded self-heal (one shot)
        id: heal
        if: steps.initial.outputs.ok != 'true'
        env:
          BASE_URL: ${{ secrets.NURSENEST_PRODUCTION_BASE_URL }}
          SECRET: ${{ secrets.NURSENEST_RELIABILITY_SECRET }}
        run: |
          set -euo pipefail
          BASE_URL="${BASE_URL%/}"
          echo "Invoking bounded self-heal on ${BASE_URL}"
          curl -sS -f -X POST "${BASE_URL}/api/internal/reliability/self-heal" \
            -H "Content-Type: application/json" \
            -H "x-nursenest-reliability-secret: ${SECRET}" \
            -d '{"action":"revalidate-critical-paths"}' | tee /tmp/nn-self-heal.json
          echo "Waiting 30s before re-check..."
          sleep 30

      - name: Recheck after self-heal
        id: recheck
        if: steps.initial.outputs.ok != 'true' && steps.heal.outcome == 'success'
        continue-on-error: true
        env:
          BASE_URL: ${{ secrets.NURSENEST_PRODUCTION_BASE_URL }}
          SECRET: ${{ secrets.NURSENEST_RELIABILITY_SECRET }}
        run: |
          set -euo pipefail
          BASE_URL="${BASE_URL%/}"
          HTTP_CODE="$(curl -sS -o /tmp/nn-reliability-2.json -w "%{http_code}" \
            -H "x-nursenest-reliability-secret: ${SECRET}" \
            "${BASE_URL}/api/internal/reliability/check")"
          echo "HTTP ${HTTP_CODE}"
          cat /tmp/nn-reliability-2.json
          if [ "$HTTP_CODE" != "200" ]; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          OK="$(jq -r '.ok // false' /tmp/nn-reliability-2.json)"
          echo "ok=${OK}" >> "$GITHUB_OUTPUT"
          if [ "$OK" != "true" ]; then
            echo "::error::Reliability check still ok=false after self-heal"
            exit 1
          fi

      - name: Conclude
        if: always()
        run: |
          set -euo pipefail
          if [ "${{ steps.initial.outputs.ok }}" = "true" ]; then
            echo "Healthy on first check."
            exit 0
          fi
          if [ "${{ steps.recheck.outputs.ok }}" = "true" ]; then
            echo "Recovered after self-heal."
            exit 0
          fi
          echo "::error::Production reliability check failed (see prior steps)."
          exit 1
