# Build production Docker image → push to GHCR → trigger DigitalOcean deployment.
#
# DO App Platform pulls the pre-built image instead of cloning GitHub,
# eliminating the "Selecting branch" hang entirely.
#
# Production deploys must use the sha-* image tag, not the mutable latest tag,
# otherwise App Platform/CDN/runtime state can continue serving a stale image.
#
# Required GitHub repo secrets:
#   DIGITALOCEAN_ACCESS_TOKEN   DO personal access token (App write scope)

name: Build → GHCR → Deploy DigitalOcean

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

# During CI repair chains, stale partial-fix deploy builds must not block the
# latest main commit from reaching GHCR and DigitalOcean.
concurrency:
  group: ghcr-build-main
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install deploy guard dependencies
        run: npm install --prefix /tmp/deploy-guard-deps --no-save --ignore-scripts --no-audit --no-fund js-yaml@4.1.1

      - name: "[deploy-guard] Dockerfile must not bake DATABASE_URL"
        run: node nursenest-core/scripts/verify-dockerfile-database-url.mjs

      - name: "[deploy-guard] GHCR runtime secret scopes (RUN_TIME)"
        run: node scripts/audit-ghcr-runtime-secret-scopes.mjs .do/app-nursenest-core-next.yaml
        env:
          NODE_PATH: /tmp/deploy-guard-deps/node_modules

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        env:
          # Job summary + downloadable build record (see Summaries in build-push-action README).
          DOCKER_BUILD_SUMMARY: true
          DOCKER_BUILD_RECORD_UPLOAD: true
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/nursenest:sha-${{ github.sha }}
          build-args: |
            NN_BUILD_COMMIT=${{ github.sha }}
            NN_BUILD_BRANCH=main
            GITHUB_SHA=${{ github.sha }}
            GITHUB_REF_NAME=main
            NN_TIMED_INCLUDE_NPM_PRUNE=1
            BUILD_NODE_MAX_OLD_SPACE_SIZE_MB=2048
          shm-size: 2g
          provenance: false
          sbom: false

      - name: Build job summary (failure hints)
        if: failure() && steps.build.outcome == 'failure'
        run: |
          {
            echo "## Docker build failed"
            echo ""
            echo "Open the **Build and push image** step above, then:"
            echo "1. Expand the step — the **job summary** tab should list each Dockerfile \`RUN\` stage and errors."
            echo "2. Download the **build record** artifact linked in that summary (if present) for full BuildKit logs."
            echo ""
            echo "### Common causes on \`ubuntu-latest\` (~7 GiB RAM)"
            echo "- **OOM during \`npm run heroku-postbuild\`** — look for \`SIGKILL\` / exit code 137 / silent \`exit code: 1\` right after \`next build\`."
            echo "- **Stale GHA build cache** — re-run with cache cleared or temporarily set \`cache-from:\` / \`cache-to:\` empty in the workflow."
            echo ""
            echo "### This repo’s mitigations (already in Dockerfile / build-args)"
            echo "- Turbopack + multi-worker compile enforced inside the build wrapper"
            echo "- \`BUILD_NODE_MAX_OLD_SPACE_SIZE_MB=2048\` (heap cap for Next compile inside the image build)"
            echo "- \`SKIP_I18N_PREBUILD=1\`, \`NN_SKIP_HEAVY_BUILD_REPORTS=1\`"
            echo ""
            echo "Commit: \`${{ github.sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Trigger DigitalOcean deployment
        env:
          DO_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
        run: |
          echo "Image pushed:"
          echo "  sha: ghcr.io/${{ github.repository_owner }}/nursenest:sha-${{ github.sha }}"
          echo "  digest: ${{ steps.build.outputs.digest }}"

          if [ -z "$DO_TOKEN" ]; then
            echo "::error::DIGITALOCEAN_ACCESS_TOKEN secret is not set — DigitalOcean will NOT deploy the new image."
            exit 1
          fi

          APP_ID="d6a4b825-4d70-4dd4-8d71-04b354d36f43"
          NEW_TAG="sha-${{ github.sha }}"
          export NEW_TAG

          # Fetch current live spec from DO (preserves encrypted secret values).
          # Patch only the image tag for the web service, then PUT the modified spec back.
          # This prevents doctl --spec from clearing RUN_TIME secrets that have no
          # value field in the repo spec (type: SECRET with no value = spec-only declaration).
          curl -fsSL \
            -H "Authorization: Bearer $DO_TOKEN" \
            "https://api.digitalocean.com/v2/apps/${APP_ID}" \
            > /tmp/do-app.json

          PATCHED_SPEC=$(python3 - <<'PY'
          import sys, json, os
          with open("/tmp/do-app.json", "r", encoding="utf-8") as f:
              payload = json.load(f)
          spec = payload["app"]["spec"]
          tag = os.environ["NEW_TAG"]
          for svc in spec.get("services", []):
              if svc.get("name") == "web" and svc.get("image"):
                  svc["image"]["tag"] = tag
          print(json.dumps(spec))
          PY
          )

          curl -fsSL -X PUT \
            -H "Authorization: Bearer $DO_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.digitalocean.com/v2/apps/${APP_ID}" \
            -d "{\"spec\": $PATCHED_SPEC}" > /dev/null

          echo "DigitalOcean app spec updated to image tag ${NEW_TAG}."
          echo "Track at: https://cloud.digitalocean.com/apps/${APP_ID}"
