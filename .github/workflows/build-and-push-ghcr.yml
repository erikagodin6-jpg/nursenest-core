# Legacy GHCR image build (root Dockerfile). Production Next.js uses DigitalOcean App Platform
# (source_dir nursenest-core). This job needs a full checkout: the Dockerfile copies `nursenest-core/`,
# `shared/`, `client/`, and repo-root `script/`.
name: Build and Push GHCR Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ghcr-build-main
  cancel-in-progress: true

jobs:
  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        env:
          DOCKER_BUILDKIT: "1"
        run: |
          set -euxo pipefail
          IMAGE="ghcr.io/${{ github.repository_owner }}/nursenest"
          SHORT_SHA="${GITHUB_SHA::7}"
          docker build -f Dockerfile -t "${IMAGE}:latest" -t "${IMAGE}:sha-${SHORT_SHA}" .
          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:sha-${SHORT_SHA}"
