# Build production Docker image → push to GHCR → trigger DigitalOcean deployment.
#
# DO App Platform pulls the pre-built image instead of cloning GitHub,
# eliminating the "Selecting branch" hang entirely.
#
# ── Required GitHub repo secrets ─────────────────────────────────────────────
#   DIGITALOCEAN_ACCESS_TOKEN   DO personal access token (App write scope)
#
# ── One-time manual setup ────────────────────────────────────────────────────
#   Make the GHCR package public so DO can pull without credentials:
#   GitHub → erikagodin6-jpg → Packages → nursenest → Package settings
#     → Change visibility → Public
#   (Safe: the image contains no secrets; all secrets are DO runtime env vars.)
# ─────────────────────────────────────────────────────────────────────────────

name: Build → GHCR → Deploy DigitalOcean

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ghcr-build-main
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/nursenest:latest
            ghcr.io/${{ github.repository_owner }}/nursenest:sha-${{ github.sha }}
          build-args: |
            NN_BUILD_COMMIT=${{ github.sha }}
            NN_BUILD_BRANCH=main
            GITHUB_SHA=${{ github.sha }}
            GITHUB_REF_NAME=main
            BUILD_WEBPACK_PARALLELISM=1
            NN_FORCE_SINGLE_BUILD_WORKER=true
            NN_TIMED_INCLUDE_NPM_PRUNE=1
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Trigger DigitalOcean deployment
        env:
          DO_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
        run: |
          echo "Image pushed:"
          echo "  latest: ghcr.io/${{ github.repository_owner }}/nursenest:latest"
          echo "  sha:    ghcr.io/${{ github.repository_owner }}/nursenest:sha-${{ github.sha }}"
          echo "  digest: ${{ steps.build.outputs.digest }}"

          if [ -z "$DO_TOKEN" ]; then
            echo ""
            echo "WARN: DIGITALOCEAN_ACCESS_TOKEN secret not set — skipping DO deploy trigger."
            echo "Add the secret to this repo to enable automatic deploys after image push."
            exit 0
          fi

          HTTP_STATUS=$(curl -s -o /tmp/do-response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $DO_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.digitalocean.com/v2/apps/d6a4b825-4d70-4dd4-8d71-04b354d36f43/deployments")

          echo "DO API response (HTTP $HTTP_STATUS):"
          cat /tmp/do-response.json

          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "201" ]; then
            echo "ERROR: DO deploy trigger returned HTTP $HTTP_STATUS"
            exit 1
          fi

          DEPLOY_ID=$(jq -r '.deployment.id // "unknown"' /tmp/do-response.json)
          echo ""
          echo "DigitalOcean deployment triggered: $DEPLOY_ID"
          echo "Track at: https://cloud.digitalocean.com/apps/d6a4b825-4d70-4dd4-8d71-04b354d36f43"
