# Build production Docker image → push to GHCR → trigger DigitalOcean deployment.
#
# DO App Platform pulls the pre-built image instead of cloning GitHub,
# eliminating the "Selecting branch" hang entirely.
#
# Production deploys must use the sha-* image tag, not the mutable latest tag,
# otherwise App Platform/CDN/runtime state can continue serving a stale image.
#
# Required GitHub repo secrets:
#   DIGITALOCEAN_ACCESS_TOKEN   DO personal access token (App write scope)

name: Build → GHCR → Deploy DigitalOcean

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ghcr-build-main
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/nursenest:latest
            ghcr.io/${{ github.repository_owner }}/nursenest:sha-${{ github.sha }}
          build-args: |
            NN_BUILD_COMMIT=${{ github.sha }}
            NN_BUILD_BRANCH=main
            GITHUB_SHA=${{ github.sha }}
            GITHUB_REF_NAME=main
            BUILD_WEBPACK_PARALLELISM=1
            NN_FORCE_SINGLE_BUILD_WORKER=true
            NN_TIMED_INCLUDE_NPM_PRUNE=1
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Render immutable DigitalOcean spec
        run: |
          cp .do/app-nursenest-core-next.yaml /tmp/app-nursenest-core-next.yaml
          python3 - <<'PY'
          from pathlib import Path
          import os

          spec_path = Path('/tmp/app-nursenest-core-next.yaml')
          text = spec_path.read_text()
          old = '      tag: latest'
          new = f'      tag: sha-{os.environ["GITHUB_SHA"]}'
          if old not in text:
              raise SystemExit('Expected GHCR image tag line not found in DO spec')
          spec_path.write_text(text.replace(old, new, 1))
          PY
          echo "Rendered DO spec image tag: sha-${GITHUB_SHA}"

      - name: Trigger DigitalOcean deployment
        env:
          DO_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
        run: |
          echo "Image pushed:"
          echo "  latest: ghcr.io/${{ github.repository_owner }}/nursenest:latest"
          echo "  sha:    ghcr.io/${{ github.repository_owner }}/nursenest:sha-${{ github.sha }}"
          echo "  digest: ${{ steps.build.outputs.digest }}"

          if [ -z "$DO_TOKEN" ]; then
            echo "ERROR: DIGITALOCEAN_ACCESS_TOKEN secret is not set."
            echo "Production cannot be updated without this secret because DigitalOcean must be pointed at the immutable sha image tag."
            exit 1
          fi

          curl -fsSL https://github.com/digitalocean/doctl/releases/download/v1.124.0/doctl-1.124.0-linux-amd64.tar.gz \
            | tar -xz -C /tmp
          /tmp/doctl auth init --access-token "$DO_TOKEN"

          /tmp/doctl apps update d6a4b825-4d70-4dd4-8d71-04b354d36f43 --spec /tmp/app-nursenest-core-next.yaml

          echo "DigitalOcean app spec updated to image tag sha-${{ github.sha }}."
          echo "Track at: https://cloud.digitalocean.com/apps/d6a4b825-4d70-4dd4-8d71-04b354d36f43"
