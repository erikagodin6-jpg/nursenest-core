name: i18n-readiness

on:
  pull_request:
    paths:
      - "nursenest-core/public/i18n/**"
      - "nursenest-core/src/lib/i18n/**"
      - "nursenest-core/src/lib/seo/**"
      - "nursenest-core/scripts/audit-*-i18n*.mjs"
      - "nursenest-core/scripts/audit-french-completeness.mjs"
      - "nursenest-core/scripts/audit-spanish-completeness.mjs"
      - "nursenest-core/scripts/translate-fr-missing.mjs"
      - "nursenest-core/scripts/translate-es-missing.mjs"
      - "nursenest-core/scripts/translate-es-critical-identical.mjs"
      - "nursenest-core/tests/e2e/i18n/**"
      - "nursenest-core/playwright.i18n-routes.config.ts"
      - ".github/workflows/i18n-readiness.yml"
  push:
    branches:
      - main

jobs:
  i18n-readiness:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nursenest-core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: nursenest-core/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: English i18n regression audit
        run: npm run i18n:audit:en
      - name: French completeness audit
        run: npm run i18n:audit:fr
      - name: Spanish completeness audit
        run: npm run i18n:audit:es
      - name: SEO i18n verification
        run: npm run i18n:seo:verify
      - name: Route rendering verification
        run: npm run test:i18n:routes
