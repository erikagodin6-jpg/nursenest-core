<!DOCTYPE html>
<html lang="en" data-theme="ocean" id="root-html">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RN Practice Exam — In-Session Mockups</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:#0f172a;color:#e2e8f0;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:transparent}

[data-theme="ocean"]{
  --semantic-surface:#fff;--semantic-panel-muted:#f4f9fc;--semantic-border-soft:#e2ebf3;
  --semantic-text-primary:#0f172a;--semantic-text-secondary:#455569;--semantic-text-muted:#647894;
  --semantic-brand:#0d7aaa;--semantic-brand-mix:#1aaee0;--semantic-info:#2563eb;--semantic-success:#16a34a;
  --semantic-warning:#d97706;--semantic-danger:#e11d48;--semantic-chart-1:#1aaee0;--semantic-chart-2:#16a34a;
  --semantic-chart-3:#7c3aed;--semantic-chart-4:#d97706;--semantic-chart-5:#e11d48;
  --theme-heading-text:#0f172a;--nav-bg:#fff;--nav-fg:#0f172a;
}
[data-theme="blossom"]{
  --semantic-surface:#fffcfb;--semantic-panel-muted:#fff5f7;--semantic-border-soft:#f5e4e8;
  --semantic-text-primary:#3b1224;--semantic-text-secondary:#6b3a4d;--semantic-text-muted:#9a6b7d;
  --semantic-brand:#b8325a;--semantic-brand-mix:#e85d8a;--semantic-info:#7c3aed;--semantic-success:#059669;
  --semantic-warning:#ca8a04;--semantic-danger:#dc2626;--semantic-chart-1:#e85d8a;--semantic-chart-2:#059669;
  --semantic-chart-3:#7c3aed;--semantic-chart-4:#ca8a04;--semantic-chart-5:#dc2626;
  --theme-heading-text:#3b1224;--nav-bg:#fffcfb;--nav-fg:#3b1224;
}
[data-theme="midnight"]{
  --semantic-surface:#121a2e;--semantic-panel-muted:#1a2438;--semantic-border-soft:#2a3650;
  --semantic-text-primary:#e8eef8;--semantic-text-secondary:#a8b8d0;--semantic-text-muted:#7b8ca8;
  --semantic-brand:#5eb8e8;--semantic-brand-mix:#7ec8f0;--semantic-info:#60a5fa;--semantic-success:#4ade80;
  --semantic-warning:#fbbf24;--semantic-danger:#fb7185;--semantic-chart-1:#7ec8f0;--semantic-chart-2:#4ade80;
  --semantic-chart-3:#a78bfa;--semantic-chart-4:#fbbf24;--semantic-chart-5:#fb7185;
  --theme-heading-text:#f1f5f9;--nav-bg:#0c1220;--nav-fg:#e8eef8;
}

.ctrl{background:#0c1220;border-bottom:1px solid #1e293b;padding:12px 20px;position:sticky;top:0;z-index:100}
.ctrl h1{font-size:13px;font-weight:700;color:#f8fafc;margin-bottom:8px}
.ctrl-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:6px}
.ctrl-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#64748b;min-width:52px}
.pill{padding:6px 12px;border-radius:8px;font-size:11px;font-weight:600;color:#94a3b8;background:#1e293b}
.pill.on{color:#38bdf8;background:#0f2744}
.pill.theme.on{color:#f0f9ff}
.stage{display:flex;justify-content:center;padding:28px 20px 48px}
#exam-viewport{width:1280px;height:900px;background:var(--semantic-surface);color:var(--semantic-text-primary);overflow:hidden;display:flex;flex-direction:column;box-shadow:0 24px 80px rgba(0,0,0,.45);border-radius:12px;border:1px solid var(--semantic-border-soft)}

.exam-top{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:10px 16px;border-bottom:1px solid var(--semantic-border-soft);background:var(--semantic-surface);flex-shrink:0}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--semantic-brand-mix),var(--semantic-brand));color:#fff;font-weight:800;font-size:14px;display:flex;align-items:center;justify-content:center}
.logo-name{font-size:13px;font-weight:800;color:var(--semantic-text-primary);line-height:1.1}
.logo-sub{font-size:10px;color:var(--semantic-text-muted);font-weight:600}
.practice-chip{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:3px 8px;border-radius:6px;margin-left:8px;background:color-mix(in srgb,var(--semantic-success) 12%,var(--semantic-surface));border:1px solid color-mix(in srgb,var(--semantic-success) 28%,var(--semantic-border-soft));color:var(--semantic-success)}
.result-chip{font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:3px 8px;border-radius:6px;margin-left:8px;display:inline-flex;align-items:center;gap:4px}
.result-chip.ok{background:color-mix(in srgb,var(--semantic-success) 10%,var(--semantic-surface));border:1px solid color-mix(in srgb,var(--semantic-success) 30%,var(--semantic-border-soft));color:var(--semantic-success)}
.result-chip.err{background:color-mix(in srgb,var(--semantic-danger) 10%,var(--semantic-surface));border:1px solid color-mix(in srgb,var(--semantic-danger) 28%,var(--semantic-border-soft));color:var(--semantic-danger)}
.stat-block{text-align:center}
.stat-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--semantic-text-muted)}
.stat-val{font-size:14px;font-weight:700;color:var(--semantic-text-primary)}
.top-actions{display:flex;gap:6px;align-items:center}
.icon-btn{height:32px;padding:0 10px;border-radius:8px;border:1px solid var(--semantic-border-soft);font-size:11px;font-weight:600;color:var(--semantic-text-secondary);background:var(--semantic-panel-muted)}
.progress-strip{height:4px;background:color-mix(in srgb,var(--semantic-chart-2) 12%,var(--semantic-border-soft));flex-shrink:0}
.progress-fill{height:100%;width:30%;background:linear-gradient(90deg,var(--semantic-chart-1),var(--semantic-chart-2));border-radius:0 2px 2px 0}

.exam-body{flex:1;min-height:0;display:flex;overflow:hidden}
.q-scroll{flex:1;min-height:0;overflow:auto;padding:24px 32px 16px}
.qcard{border:1px solid var(--semantic-border-soft);border-radius:16px;padding:24px 28px;background:var(--semantic-surface);box-shadow:0 6px 24px -12px color-mix(in srgb,var(--semantic-brand) 15%,transparent)}
.qhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--semantic-border-soft)}
.qpill{font-size:9px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--semantic-brand);background:color-mix(in srgb,var(--semantic-brand) 9%,var(--semantic-surface));border:1px solid color-mix(in srgb,var(--semantic-brand) 22%,var(--semantic-border-soft));padding:4px 10px;border-radius:6px}
.stem{font-size:1rem;line-height:1.72;color:var(--theme-heading-text);max-width:52rem;margin-bottom:18px}
.stem strong{font-weight:700}
.opt-list{display:flex;flex-direction:column;gap:9px}
.opt{border:1.5px solid var(--semantic-border-soft);border-radius:12px;background:var(--semantic-surface);overflow:hidden}
.opt-row{display:flex;gap:12px;align-items:flex-start;padding:14px 16px}
.opt-letter{min-width:26px;height:26px;border-radius:7px;background:var(--semantic-panel-muted);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--semantic-text-muted)}
.opt-text{font-size:14px;line-height:1.55;color:var(--semantic-text-secondary);flex:1}
.opt.sel{border-color:var(--semantic-brand);background:color-mix(in srgb,var(--semantic-brand) 6%,var(--semantic-surface))}
.opt.sel .opt-letter{background:var(--semantic-brand);color:#fff}
.opt.sel .opt-text{color:var(--semantic-text-primary);font-weight:600}
.opt.ok{border-color:color-mix(in srgb,var(--semantic-success) 45%,var(--semantic-border-soft));background:color-mix(in srgb,var(--semantic-success) 8%,var(--semantic-surface))}
.opt.ok .opt-letter{background:var(--semantic-success);color:#fff}
.opt.err{border-color:color-mix(in srgb,var(--semantic-danger) 45%,var(--semantic-border-soft));background:color-mix(in srgb,var(--semantic-danger) 8%,var(--semantic-surface))}
.opt.err .opt-letter{background:var(--semantic-danger);color:#fff}
.opt.dim{opacity:.5}
.opt-rat{display:none;padding:10px 16px 12px 54px;font-size:12px;line-height:1.6;color:var(--semantic-text-muted);border-top:1px solid var(--semantic-border-soft)}
.opt-rat.show{display:block}
.opt.ok .opt-rat{background:color-mix(in srgb,var(--semantic-success) 6%,var(--semantic-surface));color:color-mix(in srgb,var(--semantic-success) 55%,var(--semantic-text-secondary))}
.opt.err .opt-rat{background:color-mix(in srgb,var(--semantic-danger) 6%,var(--semantic-surface));color:color-mix(in srgb,var(--semantic-danger) 50%,var(--semantic-text-secondary))}
.rat-tag{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.rat-tag.ok{color:var(--semantic-success)}
.rat-tag.err{color:var(--semantic-danger)}
.full-rat{display:none;margin-top:14px;padding:16px 18px;border-radius:12px;border:1px solid var(--semantic-border-soft);background:var(--semantic-panel-muted)}
.full-rat.show{display:block}
.full-rat h3{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--semantic-success);margin-bottom:8px}
.full-rat p{font-size:13px;line-height:1.65;color:var(--semantic-text-secondary)}
.lesson-link{display:inline-flex;align-items:center;gap:6px;margin-top:12px;font-size:12px;font-weight:700;color:var(--semantic-brand);text-decoration:none}
.lesson-link:hover{text-decoration:underline}
.chk{width:20px;height:20px;border-radius:5px;border:2px solid var(--semantic-border-soft);flex-shrink:0;margin-top:2px}
.opt.sel .chk{background:var(--semantic-success);border-color:var(--semantic-success)}

.exam-foot{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-top:1px solid var(--semantic-border-soft);background:var(--semantic-surface)}
.foot-btn{padding:10px 18px;border-radius:10px;font-size:13px;font-weight:700;border:1px solid var(--semantic-border-soft);color:var(--semantic-text-secondary);background:var(--semantic-surface)}
.foot-btn.primary{background:var(--semantic-brand);border-color:var(--semantic-brand);color:#fff}
.foot-btn.success{background:var(--semantic-success);border-color:var(--semantic-success);color:#fff}
.foot-meta{font-size:11px;color:var(--semantic-text-muted);font-variant-numeric:tabular-nums}
</style>
</head>
<body>

<div class="ctrl">
  <h1>RN Practice exam in-session · Submit → rationale → Next · Ocean / Blossom / Midnight</h1>
  <div class="ctrl-row">
    <span class="ctrl-label">State</span>
    <div id="state-tabs"></div>
  </div>
  <div class="ctrl-row">
    <span class="ctrl-label">Theme</span>
    <button type="button" class="pill theme on" data-theme-pick="ocean">Ocean</button>
    <button type="button" class="pill theme" data-theme-pick="blossom">Blossom</button>
    <button type="button" class="pill theme" data-theme-pick="midnight">Midnight</button>
  </div>
</div>

<div class="stage">
  <div id="exam-viewport" data-capture-root data-capture-state="pre_submit" data-capture-theme="ocean">
    <header class="exam-top" id="exam-top"></header>
    <div class="progress-strip"><div class="progress-fill"></div></div>
    <div class="exam-body">
      <div class="q-scroll" id="q-content"></div>
    </div>
    <footer class="exam-foot" id="exam-foot"></footer>
  </div>
</div>

<script>
const STATES = [
  { id: 'pre_submit', label: 'Pre-submit' },
  { id: 'rationale_correct', label: 'Rationale · correct' },
  { id: 'rationale_incorrect', label: 'Rationale · incorrect' },
  { id: 'sata_rationale', label: 'SATA · post-submit' },
];

let currentState = 'pre_submit';

function renderTop(state) {
  const reviewed = state !== 'pre_submit';
  const correct = state === 'rationale_correct' || state === 'sata_rationale';
  const incorrect = state === 'rationale_incorrect';
  let result = '';
  if (correct) result = '<span class="result-chip ok">✓ Correct</span>';
  if (incorrect) result = '<span class="result-chip err">✕ Incorrect</span>';
  document.getElementById('exam-top').innerHTML = `
    <div class="logo">
      <div class="logo-mark" aria-hidden="true">N</div>
      <div>
        <div class="logo-name">NurseNest<span class="practice-chip">Practice</span>${result}</div>
        <div class="logo-sub">Tutor mode · adaptive session</div>
      </div>
    </div>
    <div class="stat-block"><div class="stat-label">Question</div><div class="stat-val">12 / 40</div></div>
    <div class="stat-block"><div class="stat-label">${reviewed ? 'Status' : 'Time'}</div><div class="stat-val">${reviewed ? 'Reviewed' : '00:18:42'}</div></div>
    <div class="top-actions">
      <button type="button" class="icon-btn">Calculator</button>
      <button type="button" class="icon-btn">Notes</button>
      <button type="button" class="icon-btn">Flag</button>
      <button type="button" class="icon-btn">End session</button>
    </div>`;
}

function renderMcqOpts(showRat, wrongPick) {
  const opts = [
    { l: 'A', t: 'Administer furosemide 40 mg IV as ordered', rat: 'Pharmacology follows ABC stabilization — not first.', ok: false, err: wrongPick === 'A' },
    { l: 'B', t: 'Position high-Fowler and apply O₂ 2–4 L/min via nasal cannula', rat: 'Correct: reduces preload and treats SpO₂ 92% immediately.', ok: true, err: false },
    { l: 'C', t: 'Obtain 12-lead ECG before provider callback', rat: 'Assessment is important but secondary to breathing.', ok: false, err: false },
    { l: 'D', t: 'Increase IV rate to maintain preload', rat: 'Contraindicated with fluid overload and crackles.', ok: false, err: false },
  ];
  return opts.map(o => {
    const sel = !showRat && o.l === 'B';
    const cls = showRat
      ? (o.ok ? 'ok' : o.err ? 'err' : 'dim')
      : (sel ? 'sel' : '');
    const ratHtml = showRat ? `
      <div class="opt-rat show">
        <div class="rat-tag ${o.ok ? 'ok' : o.err ? 'err' : ''}">${o.ok ? 'Correct answer' : o.err ? 'Your answer' : 'Why not ' + o.l}</div>
        ${o.rat}
      </div>` : '';
    return `<div class="opt ${cls}"><div class="opt-row"><span class="opt-letter">${o.l}</span><span class="opt-text">${o.t}</span></div>${ratHtml}</div>`;
  }).join('');
}

function renderSataOpts() {
  const items = [
    { t: 'Elevate head of bed to high-Fowler', sel: true, rat: 'Reduces venous return — key for dyspnea.' },
    { t: 'Apply supplemental oxygen', sel: true, rat: 'Targets SpO₂ below 94%.' },
    { t: 'Restrict fluids to 1 L/day', sel: false, rat: 'May be ordered later; not universal first action.' },
    { t: 'Increase IV maintenance rate', sel: false, rat: 'Harmful with pulmonary edema.' },
  ];
  return items.map(o => `
    <div class="opt ok">
      <div class="opt-row"><span class="chk"></span><span class="opt-text">${o.t}</span></div>
      <div class="opt-rat show"><div class="rat-tag ok">Rationale</div>${o.rat}</div>
    </div>`).join('');
}

function renderContent() {
  renderTop(currentState);
  const stem = `<p class="stem">A <strong>68-year-old client</strong> with acute heart failure reports increased dyspnea, SpO₂ <strong>92%</strong> on room air, bilateral crackles, and 2+ edema. <strong>Which action should the nurse take first?</strong></p>`;
  let body = '';
  if (currentState === 'sata_rationale') {
    body = `<div class="qcard"><div class="qhead"><span class="qpill">Select all that apply · Cardiovascular</span><button type="button" class="icon-btn">Flag</button></div>${stem}<div class="opt-list">${renderSataOpts()}</div>
      <div class="full-rat show"><h3>Clinical rationale</h3><p>Immediate nursing actions focus on airway, breathing, and reducing preload. Fluid restriction and diuretics may follow once oxygenation improves.</p>
      <a class="lesson-link" href="#">↗ Review: Heart failure exacerbation lesson</a></div></div>`;
  } else {
    const showRat = currentState !== 'pre_submit';
    const wrong = currentState === 'rationale_incorrect';
    body = `<div class="qcard"><div class="qhead"><span class="qpill">Cardiovascular &amp; oxygenation</span><button type="button" class="icon-btn">Flag</button></div>${stem}
      <div class="opt-list">${renderMcqOpts(showRat, wrong ? 'A' : null)}</div>
      ${showRat ? `<div class="full-rat show"><h3>Clinical rationale</h3><p>ABC priority: position and oxygenation precede diuretics when SpO₂ is compromised. Maslow physiological needs guide FIRST-action items.</p>
      <a class="lesson-link" href="#">↗ Open lesson: Acute HF — nursing priorities</a></div>` : ''}
    </div>`;
  }
  document.getElementById('q-content').innerHTML = body;

  const foot = document.getElementById('exam-foot');
  if (currentState === 'pre_submit') {
    foot.innerHTML = `<div><button type="button" class="foot-btn">Previous</button> <button type="button" class="foot-btn">Flag for review</button></div>
      <button type="button" class="foot-btn primary">Submit answer</button>`;
  } else {
    foot.innerHTML = `<div><button type="button" class="foot-btn">Previous</button></div>
      <span class="foot-meta">12 of 40 · 11 correct</span>
      <button type="button" class="foot-btn success">Next question →</button>`;
  }

  const vp = document.getElementById('exam-viewport');
  vp.setAttribute('data-capture-state', currentState);
}

function buildStateTabs() {
  const el = document.getElementById('state-tabs');
  el.innerHTML = '';
  STATES.forEach(s => {
    const b = document.createElement('button');
    b.type = 'button';
    b.className = 'pill' + (s.id === currentState ? ' on' : '');
    b.dataset.statePick = s.id;
    b.textContent = s.label;
    b.onclick = () => { currentState = s.id; buildStateTabs(); renderContent(); };
    el.appendChild(b);
  });
}

document.querySelectorAll('[data-theme-pick]').forEach(btn => {
  btn.onclick = () => {
    document.documentElement.setAttribute('data-theme', btn.dataset.themePick);
    document.querySelectorAll('[data-theme-pick]').forEach(b => b.classList.toggle('on', b === btn));
    document.getElementById('exam-viewport').setAttribute('data-capture-theme', btn.dataset.themePick);
  };
});

buildStateTabs();
renderContent();
</script>
</body>
</html>
