<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NurseNest Practice Exam — Mockups</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'DM Sans',system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;background:#1e293b}
button{font-family:inherit}svg{display:block;flex-shrink:0}

/* Chrome */
.chrome{background:#0a0f1a;padding:10px 22px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:300;border-bottom:1px solid #1e293b}
.chrome-title{font-size:10px;font-weight:700;color:#94a3b8;letter-spacing:.08em;text-transform:uppercase}
.tabs{background:#0f1623;padding:0 22px 0;display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;position:sticky;top:40px;z-index:299;padding-top:7px}
.tabs::-webkit-scrollbar{display:none}
.tsep{width:1px;height:13px;background:#1e293b;margin:0 5px 7px;align-self:center}
.tab{padding:5px 12px 7px;font-size:10px;font-weight:600;color:#475569;border-radius:4px 4px 0 0;cursor:pointer;white-space:nowrap;font-family:inherit;background:transparent;border:none}
.tab.on{color:#0f172a;background:white;font-weight:700}
.tg{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#334155;padding:7px 5px 0;align-self:flex-start}

.frame{display:none;width:1440px;height:900px;overflow:hidden;position:relative}
.frame.mob{width:390px;height:844px}
.frame.on{display:block}

/* ═══ TOKEN SETS ══════════════════════════════════════════════════ */
.oc{
  --bg:#f0f5fa;--surf:#fff;--panel:#f7fafd;--panel2:#eef4fa;
  --bdr:rgba(180,218,240,.7);--bdr2:rgba(140,196,228,.8);--div:rgba(180,218,240,.4);
  --muted:#647894;--subtle:#94a3b8;
  --acc:#1aaee0;--acc-d:#0d7aaa;--acc-s:rgba(13,122,170,.07);
  --sel-bg:rgba(13,122,170,.07);--sel-bdr:#0d7aaa;
  --nav:#fff;--nav-bdr:rgba(180,218,240,.8);--nav-sh:0 1px 0 rgba(0,0,0,.04),0 4px 12px -6px rgba(6,88,140,.08);
  --bot:#fff;--bot-bdr:rgba(180,218,240,.8);--bot-sh:0 -1px 0 rgba(0,0,0,.03),0 -8px 24px -12px rgba(6,88,140,.06);
  --txt:#0f172a;--txt2:#455569;--muted2:#647894;
  --ok:#16a34a;--ok-bg:rgba(22,163,74,.08);--ok-bdr:rgba(22,163,74,.28);
  --err:#dc2626;--err-bg:rgba(220,38,38,.07);--err-bdr:rgba(220,38,38,.25);
  --warn:#d97706;
  --lbg:#f1f5f9;--lfg:#647894;--lsel:#0d7aaa;--lself:#fff;
  --chip-bg:rgba(13,122,170,.09);--chip-bdr:rgba(13,122,170,.22);--chip-fg:#0d7aaa;
  --sh:0 1px 0 rgba(0,0,0,.03),0 6px 20px -10px rgba(6,88,140,.07);
  --prog-t:rgba(180,218,240,.4);--prog-f:#1aaee0;
  /* practice-specific */
  --rat-bg:#f8fcff;--rat-bdr:rgba(180,218,240,.6);
  --rat-ok-bg:rgba(22,163,74,.05);--rat-ok-bdr:rgba(22,163,74,.2);
  --rat-err-bg:rgba(220,38,38,.05);--rat-err-bdr:rgba(220,38,38,.18);
  --rat-muted-bg:#f7fafd;--rat-muted-bdr:rgba(180,218,240,.5);
  --full-rat-bg:#f4f8fc;--full-rat-bdr:rgba(180,218,240,.7);
}
.mn{
  --bg:#07111f;--surf:#111827;--panel:#0d1826;--panel2:#152032;
  --bdr:rgba(49,68,102,.85);--bdr2:rgba(56,189,248,.22);--div:rgba(49,68,102,.5);
  --muted:#5e7a98;--subtle:#47607c;
  --acc:#38bdf8;--acc-d:#0ea5e9;--acc-s:rgba(56,189,248,.08);
  --sel-bg:rgba(56,189,248,.1);--sel-bdr:#38bdf8;
  --nav:#0b1220;--nav-bdr:rgba(49,68,102,.9);--nav-sh:0 1px 0 rgba(0,0,0,.25),0 4px 16px -6px rgba(0,0,0,.35);
  --bot:#0b1220;--bot-bdr:rgba(49,68,102,.9);--bot-sh:0 -1px 0 rgba(0,0,0,.2),0 -8px 24px -12px rgba(0,0,0,.4);
  --txt:#f0f6ff;--txt2:#c8d8ed;--muted2:#5e7a98;
  --ok:#34d399;--ok-bg:rgba(52,211,153,.1);--ok-bdr:rgba(52,211,153,.3);
  --err:#f87171;--err-bg:rgba(248,113,113,.1);--err-bdr:rgba(248,113,113,.28);
  --warn:#fbbf24;
  --lbg:#1e2d42;--lfg:#5e7a98;--lsel:#38bdf8;--lself:#07111f;
  --chip-bg:rgba(56,189,248,.12);--chip-bdr:rgba(56,189,248,.25);--chip-fg:#7dd3fc;
  --sh:0 2px 0 rgba(0,0,0,.2),0 6px 24px -10px rgba(0,0,0,.35);
  --prog-t:rgba(49,68,102,.55);--prog-f:#38bdf8;
  --rat-bg:#0f1c2e;--rat-bdr:rgba(49,68,102,.7);
  --rat-ok-bg:rgba(52,211,153,.08);--rat-ok-bdr:rgba(52,211,153,.22);
  --rat-err-bg:rgba(248,113,113,.08);--rat-err-bdr:rgba(248,113,113,.2);
  --rat-muted-bg:#0d1826;--rat-muted-bdr:rgba(49,68,102,.6);
  --full-rat-bg:#0d1826;--full-rat-bdr:rgba(49,68,102,.8);
}

/* ═══ SHELL ══════════════════════════════════════════════════════ */
.cat{display:flex;flex-direction:column;background:var(--bg);height:900px;width:1440px;overflow:hidden}
.cat.mob{height:844px;width:390px}

/* TOP BAR — pixel-identical to CAT v2 */
.tb{height:48px;flex-shrink:0;background:var(--nav);border-bottom:1px solid var(--nav-bdr);box-shadow:var(--nav-sh);display:flex;align-items:center;padding:0 24px;gap:0;position:relative;z-index:10}
.tb-brand{font-size:14px;font-weight:800;letter-spacing:-.03em;color:var(--txt)}
.tb-dot{color:var(--acc)}
.tb-chip{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:2px 8px;border-radius:4px;margin-left:10px;background:var(--chip-bg);border:1px solid var(--chip-bdr);color:var(--chip-fg)}
/* Practice chip uses a slightly softer green tint to distinguish from CAT */
.tb-chip-practice{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:2px 8px;border-radius:4px;margin-left:10px;background:rgba(22,163,74,.1);border:1px solid rgba(22,163,74,.25);color:#15803d}
.tb-pulse{display:flex;align-items:center;gap:4px;font-size:9px;font-weight:600;letter-spacing:.05em;color:var(--muted);margin-left:10px}
.tb-pulse-dot{width:5px;height:5px;border-radius:50%;background:#22c55e;box-shadow:0 0 0 2.5px rgba(34,197,94,.18)}
.tb-center{position:absolute;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:10px}
.tb-qn{font-size:13px;font-weight:700;color:var(--txt);font-variant-numeric:tabular-nums;letter-spacing:-.01em}
.tb-of{font-size:13px;color:var(--muted);font-weight:400}
.tb-prog{width:100px;height:3px;border-radius:99px;background:var(--prog-t);overflow:hidden}
.tb-pfill{height:100%;border-radius:99px;background:var(--prog-f);transition:width .4s ease}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:4px}
.tb-timer{font-size:13.5px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:.04em;color:var(--txt);padding:5px 10px;border-radius:7px;background:var(--panel);border:1px solid var(--bdr);margin-right:6px}
.tb-ico{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;background:transparent;border:1px solid transparent;cursor:pointer;transition:.12s}
.tb-ico:hover{background:var(--panel);border-color:var(--bdr)}
.tb-ico svg{stroke:var(--muted)}
.tb-sep{width:1px;height:16px;background:var(--bdr);margin:0 3px}
.tb-exit{font-size:11px;font-weight:600;color:var(--muted);padding:5px 10px;border-radius:6px;border:1px solid var(--bdr);background:transparent;cursor:pointer;transition:.12s;margin-left:4px}

/* BODY */
.body{flex:1;display:flex;min-height:0;overflow:hidden}

/* QUESTION CANVAS */
.qcanvas{flex:1;overflow:hidden;display:flex;flex-direction:column;align-items:center;padding:28px 48px;gap:0}
.qwrap{width:100%;max-width:720px;display:flex;flex-direction:column;gap:14px}

/* QUESTION CARD — identical to CAT */
.qcard{background:var(--surf);border:1px solid var(--bdr);border-radius:18px;padding:30px 32px;box-shadow:var(--sh)}
.qhead{display:flex;align-items:center;justify-content:space-between;padding-bottom:14px;border-bottom:1px solid var(--div);margin-bottom:20px}
.qmeta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.qpill{font-size:9.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--chip-fg);background:var(--chip-bg);border:1px solid var(--chip-bdr);padding:3px 10px;border-radius:5px}
.qdiff{display:flex;gap:2px;align-items:center}
.qpip{width:7px;height:7px;border-radius:2px}
.qpip.f{background:var(--acc)}
.qpip.e{background:var(--bdr2);opacity:.3}
.qflag{width:30px;height:30px;border-radius:7px;background:transparent;border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;cursor:pointer}
.qflag svg{stroke:var(--muted)}

.stem{font-size:16px;line-height:1.78;letter-spacing:-.015em;color:var(--txt);font-weight:400;max-width:66ch}
.stem strong{font-weight:700}

/* OPTIONS — identical structure to CAT */
.opts{display:flex;flex-direction:column;gap:9px;margin-top:22px}
.opt{display:flex;flex-direction:column;border:1.5px solid var(--bdr);border-radius:13px;cursor:pointer;background:var(--surf);transition:border-color .12s,background .12s,box-shadow .12s;position:relative;overflow:hidden}
.opt::before{content:'';position:absolute;left:0;top:0;bottom:0;width:0;border-radius:13px 0 0 13px;background:var(--sel-bdr);transition:width .12s ease}
.opt-row{display:flex;align-items:flex-start;gap:14px;padding:15px 18px}
.opt:hover{border-color:var(--bdr2);background:var(--panel)}
.opt.sel{border-color:var(--sel-bdr);background:var(--sel-bg)}
.opt.sel::before{width:4px}
.opt.ok{border-color:var(--ok-bdr);background:var(--ok-bg)}
.opt.ok::before{width:4px;background:var(--ok)}
.opt.err{border-color:var(--err-bdr);background:var(--err-bg)}
.opt.err::before{width:4px;background:var(--err)}
.opt.dim{opacity:.45;pointer-events:none}
.opt.dim::before{width:0}
.oletter{width:26px;height:26px;border-radius:6px;background:var(--lbg);color:var(--lfg);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:.12s}
.opt.sel .oletter{background:var(--lsel);color:var(--lself)}
.opt.ok .oletter{background:var(--ok);color:#fff}
.opt.err .oletter{background:var(--err);color:#fff}
.otext{font-size:14px;color:var(--txt2);line-height:1.58;flex:1}
.opt.sel .otext{color:var(--txt);font-weight:500}
.opt.ok .otext{color:var(--txt)}
.opt.err .otext{color:var(--txt)}

/* ═══════════════════════════════════════════════
   PRACTICE-ONLY: Per-option rationale panels
   These appear BELOW each option row after submit.
   Same border-radius as option, no new card chrome.
   ═══════════════════════════════════════════════ */
.opt-rationale{
  display:none;
  padding:10px 18px 13px 58px; /* left-aligns with option text (26px letter + 14px gap + 18px card-pad) */
  font-size:12.5px;line-height:1.62;
  color:var(--muted);
  border-top:1px solid var(--div);
}
.opt-rationale.show{display:block}
.opt.ok .opt-rationale{color:color-mix(in srgb,var(--ok) 65%,var(--txt2));border-top-color:var(--rat-ok-bdr);background:var(--rat-ok-bg)}
.opt.err .opt-rationale{color:color-mix(in srgb,var(--err) 55%,var(--txt2));border-top-color:var(--rat-err-bdr);background:var(--rat-err-bg)}
.opt.dim .opt-rationale{color:var(--subtle)}
.rat-icon{display:inline-flex;align-items:center;gap:4px;font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;margin-bottom:3px}
.rat-icon.ok{color:var(--ok)}
.rat-icon.err{color:var(--err)}
.rat-icon.neutral{color:var(--subtle)}

/* ═══════════════════════════════════════════════
   PRACTICE-ONLY: Full clinical rationale block
   Appears below all options. Same border, same surface.
   ═══════════════════════════════════════════════ */
.full-rat{
  display:none;
  background:var(--full-rat-bg);
  border:1px solid var(--full-rat-bdr);
  border-radius:13px;
  padding:18px 20px;
  margin-top:4px;
}
.full-rat.show{display:block}
.full-rat-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.full-rat-badge{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ok);background:var(--ok-bg);border:1px solid var(--ok-bdr);padding:2px 8px;border-radius:4px}
.full-rat-title{font-size:11.5px;font-weight:700;color:var(--txt)}
.full-rat-body{font-size:13px;color:var(--txt2);line-height:1.68}
.full-rat-body p+p{margin-top:8px}
.full-rat-strategy{margin-top:12px;padding-top:10px;border-top:1px solid var(--div);display:flex;align-items:flex-start;gap:8px}
.full-rat-strategy-label{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--acc);white-space:nowrap;padding-top:2px;flex-shrink:0}
.full-rat-strategy-text{font-size:12px;color:var(--muted);line-height:1.55}

/* BOTTOM BAR — pixel-identical to CAT */
.bot{height:60px;flex-shrink:0;background:var(--bot);border-top:1px solid var(--bot-bdr);box-shadow:var(--bot-sh);display:flex;align-items:center;padding:0 36px;justify-content:space-between;gap:16px}
.bot-l{display:flex;align-items:center;gap:8px}
.bot-r{display:flex;align-items:center;gap:8px}
.btn-ghost{font-size:13px;font-weight:600;color:var(--muted);background:transparent;border:1px solid var(--bdr);padding:8px 18px;border-radius:9px;cursor:pointer;transition:.12s;display:flex;align-items:center;gap:6px}
.btn-ghost:hover{color:var(--txt);background:var(--panel);border-color:var(--bdr2)}
.btn-flag{font-size:12.5px;font-weight:600;color:var(--muted);background:transparent;border:1px solid var(--bdr);padding:7px 14px;border-radius:9px;cursor:pointer;transition:.12s;display:flex;align-items:center;gap:5px}
.btn-flag svg{stroke:var(--muted)}
.btn-primary{font-size:13px;font-weight:700;color:#fff;background:var(--acc-d);padding:9px 24px;border-radius:9px;border:none;cursor:pointer;display:flex;align-items:center;gap:6px;box-shadow:0 1px 0 rgba(0,0,0,.1),0 4px 12px -4px rgba(13,122,170,.28);transition:.12s}
.mn .btn-primary{background:var(--acc);color:#07111f;box-shadow:0 1px 0 rgba(0,0,0,.15),0 4px 14px -4px rgba(56,189,248,.32)}
.btn-primary:hover{opacity:.9}
.kbd{font-size:9.5px;font-weight:600;background:var(--panel);border:1px solid var(--bdr);border-bottom-width:2px;padding:1px 5px;border-radius:4px;color:var(--muted);font-family:monospace}
.kbhint{font-size:10.5px;color:var(--subtle);display:flex;align-items:center;gap:3px}

/* ═══ PRACTICE MODE: bottom bar post-submit variant ═══ */
.btn-continue{font-size:13px;font-weight:700;color:#fff;background:var(--ok);padding:9px 24px;border-radius:9px;border:none;cursor:pointer;display:flex;align-items:center;gap:6px;box-shadow:0 1px 0 rgba(0,0,0,.1),0 4px 12px -4px rgba(22,163,74,.3);transition:.12s}
.mn .btn-continue{color:#fff}
.bot-session-count{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums}

/* MOBILE overrides */
.mob .tb{height:44px;padding:0 12px}
.mob .tb-brand{font-size:13px}
.mob .qcanvas{padding:14px 12px}
.mob .qcard{padding:18px 16px}
.mob .stem{font-size:15px}
.mob .opts{gap:7px;margin-top:18px}
.mob .opt-row{padding:12px 14px;gap:10px}
.mob .otext{font-size:13px}
.mob .opt-rationale{padding:9px 14px 11px 50px;font-size:12px}
.mob .bot{height:56px;padding:0 10px;gap:6px}
.mob .btn-ghost{padding:8px 12px;font-size:12px}
.mob .btn-primary,.mob .btn-continue{padding:9px 16px;font-size:12.5px}
</style>
</head>
<body>
<div class="chrome">
  <span class="chrome-title">NurseNest Practice Exam — 6 Mockups · CAT shell + teaching layer</span>
</div>
<div class="tabs">
  <span class="tg">OCEAN</span>
  <button class="tab on" onclick="s(0)">1 Active (pre-submit)</button>
  <button class="tab" onclick="s(1)">2 Correct answer</button>
  <button class="tab" onclick="s(2)">3 Wrong answer</button>
  <button class="tab" onclick="s(3)">4 SATA post-submit</button>
  <div class="tsep"></div>
  <span class="tg">MIDNIGHT</span>
  <button class="tab" onclick="s(4)">5 Midnight post-submit</button>
  <div class="tsep"></div>
  <span class="tg">MOBILE</span>
  <button class="tab" onclick="s(5)">6 Mobile post-submit</button>
</div>
