<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NurseNest Lesson Mockups — PNG Gallery</title>
<style>
  body { font-family: system-ui, sans-serif; margin: 0; padding: 24px; background: #0f172a; color: #e2e8f0; }
  h1 { font-size: 1.25rem; margin-bottom: 8px; }
  p { color: #94a3b8; font-size: 14px; margin-bottom: 32px; max-width: 72ch; line-height: 1.5; }
  h2 { font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: #64748b; margin: 40px 0 16px; padding-bottom: 8px; border-bottom: 1px solid #334155; }
  .grid { display: grid; gap: 24px; }
  figure { margin: 0; background: #1e293b; border-radius: 12px; overflow: hidden; border: 1px solid #334155; }
  figcaption { padding: 12px 14px; font-size: 12px; font-weight: 600; }
  figcaption code { display: block; margin-top: 6px; font-size: 11px; font-weight: 400; color: #94a3b8; word-break: break-all; }
  img { width: 100%; height: auto; display: block; background: #fff; }
  a { color: #38bdf8; }
</style>
</head>
<body>
  <h1>Lesson design mockups (PNG)</h1>
  <p>
    Open this file in your browser: <strong>lesson-mockups/exports/index.html</strong><br>
    Repo path: <code>/root/nursenest-core/lesson-mockups/exports/</code>
  </p>

  <h2>Lesson reading workspace (v2.7)</h2>
  <div class="grid">
    <figure>
      <img src="lesson-detail-v2/desktop-reading-workspace-ocean.png" alt="Desktop reading workspace" width="1440">
      <figcaption>Desktop — full lesson<code>lesson-detail-v2/desktop-reading-workspace-ocean.png</code></figcaption>
    </figure>
    <figure>
      <img src="lesson-detail-v2/desktop-reading-collapsed-rails.png" alt="Collapsed rails">
      <figcaption>Desktop — collapsed rails<code>lesson-detail-v2/desktop-reading-collapsed-rails.png</code></figcaption>
    </figure>
    <figure>
      <img src="lesson-detail-v2/desktop-reading-wrap-below-rails.png" alt="Wrap below rails">
      <figcaption>Desktop — wrap below pearls<code>lesson-detail-v2/desktop-reading-wrap-below-rails.png</code></figcaption>
    </figure>
    <figure>
      <img src="lesson-detail-v2/mobile-reading-fullwidth.png" alt="Mobile full width">
      <figcaption>Mobile — full width<code>lesson-detail-v2/mobile-reading-fullwidth.png</code></figcaption>
    </figure>
    <figure>
      <img src="lesson-detail-v2/mobile-reading-drawer.png" alt="Mobile drawer">
      <figcaption>Mobile — TOC drawer<code>lesson-detail-v2/mobile-reading-drawer.png</code></figcaption>
    </figure>
  </div>

  <h2>Pre / post assessment</h2>
  <div class="grid">
    <figure>
      <img src="lesson-pre-post/desktop-pre-test-idle.png" alt="Pre-test idle">
      <figcaption>Pre-test — idle (lesson locked)<code>lesson-pre-post/desktop-pre-test-idle.png</code></figcaption>
    </figure>
    <figure>
      <img src="lesson-pre-post/desktop-pre-test-active.png" alt="Pre-test active">
      <figcaption>Pre-test — active<code>lesson-pre-post/desktop-pre-test-active.png</code></figcaption>
    </figure>
    <figure>
      <img src="lesson-pre-post/desktop-pre-test-complete.png" alt="Pre-test complete">
      <figcaption>Pre-test — complete<code>lesson-pre-post/desktop-pre-test-complete.png</code></figcaption>
    </figure>
    <figure>
      <img src="lesson-pre-post/desktop-lesson-post-test-idle.png" alt="Post-test idle">
      <figcaption>Lesson + post-test locked<code>lesson-pre-post/desktop-lesson-post-test-idle.png</code></figcaption>
    </figure>
    <figure>
      <img src="lesson-pre-post/desktop-post-test-active.png" alt="Post-test active">
      <figcaption>Post-test — active<code>lesson-pre-post/desktop-post-test-active.png</code></figcaption>
    </figure>
    <figure>
      <img src="lesson-pre-post/desktop-post-test-complete.png" alt="Post-test complete">
      <figcaption>Post-test — complete<code>lesson-pre-post/desktop-post-test-complete.png</code></figcaption>
    </figure>
    <figure>
      <img src="lesson-pre-post/mobile-pre-test-active.png" alt="Mobile pre-test">
      <figcaption>Mobile — pre-test<code>lesson-pre-post/mobile-pre-test-active.png</code></figcaption>
    </figure>
    <figure>
      <img src="lesson-pre-post/mobile-post-test-complete.png" alt="Mobile post-test">
      <figcaption>Mobile — post-test complete<code>lesson-pre-post/mobile-post-test-complete.png</code></figcaption>
    </figure>
  </div>
</body>
</html>
